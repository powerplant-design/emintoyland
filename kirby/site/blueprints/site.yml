title: Site
tabs:
  pages:
    label: Pages
    columns:
      - width: 1/1
        sections:
          pages:
            type: pages
            label: Pages
            status: all
            layout: cards
            size: small
            templates:
              - home
              - default
              - about
              - blog
              - blog-post
              - work
              - work-item
              - category
            create:
              - home
              - default
              - category
  media:
    label: Media
    columns:
      - width: 1/1
        sections:
          media:
            type: files
            label: Images & Files
            template: image
            layout: cards
            upload: true
  content:
    label: Content
    columns:
      - width: 1/1
        fields:
          siteDescription:
            label: Site Description
            type: textarea
          seoSiteName:
            label: Site Name (Schema)
            type: text
            help: Brand name for JSON-LD structured data
            width: 1/2
          logo:
            label: Logo
            type: files
            multiple: false
            layout: cards
            help: Upload your site logo in the Media tab, then select it here
          seoDefaultImage:
            label: Default Social Image
            type: files
            multiple: false
            layout: cards
            help: Fallback image for pages without their own OG image
          nav:
            label: Navigation Links
            type: structure
            columns:
              label: true
            fields:
              label:
                label: Label
                type: text
                width: 1/2
              href:
                label: Link
                type: text
                width: 1/2
                placeholder: /about/
          footerText:
            label: Footer Text
            type: text
          googleAnalyticsId:
            label: Google Analytics ID
            type: text
            width: 1/2
  newsletter:
    label: Newsletter
    icon: email
    columns:
      - width: 1/1
        fields:
          newsletterHeading:
            label: Heading
            type: text
          newsletterText:
            label: Text
            type: textarea
          newsletterImage:
            label: Image
            type: files
            multiple: false
            layout: cards
            help: Upload an image in the Media tab, then select it here
