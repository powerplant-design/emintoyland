title: Site
sections:
  pages:
    type: pages
    label: Pages
    status: all
    layout: cards
    size: small
    templates:
      - home
      - default
      - about
      - blog
      - blog-post
      - work
      - work-item
      - category
    create:
      - home
      - default
      - category
  media:
    type: files
    label: Images & Files
    template: image
    layout: cards
    upload: true
tabs:
  content:
    label: Content
    columns:
      - width: 1/1
        fields:
          siteDescription:
            label: Site Description
            type: textarea
          seoSiteName:
            label: Site Name (Schema)
            type: text
            help: Brand name for JSON-LD structured data
            width: 1/2
          logo:
            label: Logo
            type: files
            multiple: false
            layout: cards
            help: Upload your site logo in the Media tab, then select it here
          seoDefaultImage:
            label: Default Social Image
            type: files
            multiple: false
            layout: cards
            help: Fallback image for pages without their own OG image
          footerText:
            label: Footer Text
            type: text
          googleAnalyticsId:
            label: Google Analytics ID
            type: text
            width: 1/2
