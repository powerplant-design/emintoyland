# Shared SEO field definitions — reuse across all page blueprints
# Usage: seoTitle: fields/seo  (references the seoTitle key below)

seoTitle:
  label: Browser Title
  type: text
  help: Overrides the page title in the browser tab

seoDescription:
  label: Meta Description
  type: textarea
  help: Search result and social card description

seoOgTitle:
  label: Social Title
  type: text
  help: Title shown on Facebook/Twitter cards

seoOgDescription:
  label: Social Description
  type: textarea
  help: Description shown on Facebook/Twitter cards

seoOgImage:
  label: Social Image
  type: files
  multiple: false
  layout: cards
  parent: page
  help: 1200x630px recommended for social sharing

seoRobots:
  label: Search Indexing
  type: select
  options:
    - value: index, follow
      text: Index & Follow
    - value: noindex, nofollow
      text: No Index

seoSchema:
  label: Custom JSON-LD
  type: textarea
  size: small
  help: Override auto-generated schema with custom JSON
