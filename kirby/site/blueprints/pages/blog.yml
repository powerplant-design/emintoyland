title: Blog
tabs:
  subpages:
    label: Blog Posts
    sections:
      items:
        type: pages
        status: all
        layout: cards
        size: small
        image: page.featuredImage.toFile
        create:
          - blog-post
  content:
    label: Content
    columns:
      - width: 1/1
        fields:
          heading:
            label: Heading
            type: text
          text:
            label: Body
            type: textarea
            size: small
  seo:
    label: SEO
    columns:
      - width: 1/1
        fields:
          seoTitle:
            label: Browser Title
            type: text
          seoDescription:
            label: Meta Description
            type: textarea
          seoOgTitle:
            label: Social Title
            type: text
          seoOgDescription:
            label: Social Description
            type: textarea
          seoOgImage:
            label: Social Image
            type: files
            multiple: false
            layout: cards
            parent: page
          seoRobots:
            label: Search Indexing
            type: select
            options:
              - value: index, follow
                text: Index & Follow
              - value: noindex, nofollow
                text: No Index
  media:
    label: Media
    sections:
      uploads:
        type: files
        label: Images
        template: image
        layout: cards
        upload: true
