title: Home
tabs:
  hero:
    label: Hero
    columns:
      - width: 1/1
        fields:
          metaDescription:
            label: Meta Description
            type: textarea
          heroTagline:
            label: Tagline
            type: text
            help: Hero heading text
          heroImage:
            label: Hero Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: Upload images in the Media tab, then select one here
          heroText:
            label: Hero Text
            type: textarea
            size: large
  showcase:
    label: Showcase
    columns:
      - width: 1/1
        fields:
          showcaseHeading:
            label: Heading
            type: text
          showcaseItems:
            label: Featured Work
            type: pages
            query: page("work").children
            multiple: true
            layout: cards
            size: medium
            image: workImage
            info: "{{ page.workType }}"
            text: "{{ page.text }}"
          showcaseCtaText:
            label: CTA Button Text
            type: text
            width: 1/2
            placeholder: View all my work
            default: View all my work
          showcaseCtaLink:
            label: CTA Button Link
            type: url
            width: 1/2
            placeholder: /work/
            default: /work/
  about:
    label: About
    columns:
      - width: 1/1
        fields:
          aboutHeading:
            label: Heading
            type: text
          aboutText:
            label: Content
            type: textarea
            size: large
  media:
    label: Media
    sections:
      uploads:
        type: files
        label: Images
        template: image
        layout: cards
        upload: true
