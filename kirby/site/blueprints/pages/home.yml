title: Home
tabs:
  hero:
    label: Hero
    columns:
      - width: 1/1
        fields:
          splashHeading:
            label: Splash Heading
            type: text
            help: H1 heading in the hero splash section
          heroHeading:
            label: Hero Heading
            type: text
            help: 'H2 tagline above the body text (e.g. "Kia ora queens!")'
          heroImage:
            label: Hero Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: Upload images in the Media tab, then select one here
          heroText:
            label: Hero Text
            type: textarea
            size: small
          heroCtaText:
            label: CTA Button Text
            type: text
            width: 1/2
            placeholder: More on me
            default: More on me
          heroCtaLink:
            label: CTA Button Link
            type: text
            width: 1/2
            placeholder: /about
            default: /about
  showcase:
    label: Showcase
    columns:
      - width: 1/1
        fields:
          showcaseHeading:
            label: Heading
            type: text
          showcaseItems:
            label: Featured Work
            type: pages
            query: page("work").children
            multiple: true
            layout: cards
            size: medium
            image: workImage
            info: "{{ page.workType }}"
            text: "{{ page.text }}"
          showcaseCtaText:
            label: CTA Button Text
            type: text
            width: 1/2
            placeholder: View all my work
            default: View all my work
          showcaseCtaLink:
            label: CTA Button Link
            type: text
            width: 1/2
            placeholder: /work/
            default: /work/
  about:
    label: About
    columns:
      - width: 1/1
        fields:
          aboutHeading:
            label: Heading
            type: text
          aboutText:
            label: Content
            type: textarea
            size: large
          aboutImage:
            label: Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: Right column image
          aboutCtaText:
            label: CTA Button Text
            type: text
            width: 1/2
            placeholder: Get to know me
            default: Get to know me
          aboutCtaLink:
            label: CTA Button Link
            type: text
            width: 1/2
            placeholder: /about/
            default: /about/
  seo:
    label: SEO
    columns:
      - width: 1/1
        fields:
          seoTitle:
            label: Browser Title
            type: text
            help: Overrides the page title in the browser tab
          seoDescription:
            label: Meta Description
            type: textarea
            help: Search result and social card description
          seoOgTitle:
            label: Social Title
            type: text
            help: Title shown on Facebook/Twitter cards
          seoOgDescription:
            label: Social Description
            type: textarea
            help: Description shown on Facebook/Twitter cards
          seoOgImage:
            label: Social Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: 1200x630px recommended for social sharing
          seoRobots:
            label: Search Indexing
            type: select
            options:
              - value: index, follow
                text: Index & Follow
              - value: noindex, nofollow
                text: No Index
          seoSchema:
            label: Custom JSON-LD
            type: textarea
            size: small
            help: Override auto-generated schema with custom JSON

  media:
    label: Media
    sections:
      uploads:
        type: files
        label: Images
        template: image
        layout: cards
        upload: true
