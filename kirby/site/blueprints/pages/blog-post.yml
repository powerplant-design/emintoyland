title: Blog Post
tabs:
  content:
    label: Content
    columns:
      - width: 1/1
        fields:
          title:
            label: Title
            type: text
            width: 3/4
          publishedDate:
            label: Published Date
            type: date
            width: 1/4
          featuredImage:
            label: Featured Image
            type: files
            multiple: false
            layout: cards
            parent: page
          excerpt:
            label: Excerpt
            type: textarea
            help: Short summary shown on the blog listing grid
          tags:
            label: Tags
            type: tags
            options: query
            query: page("blog").children.pluck("tags", ",", true)
            help: Filter categories for blog posts
          _body:
            label: Body
            type: textarea
            size: large
  seo:
    label: SEO
    columns:
      - width: 1/1
        fields:
          seoTitle:
            label: Browser Title
            type: text
            help: Overrides the page title in the browser tab
          seoDescription:
            label: Meta Description
            type: textarea
            help: Search result and social card description
          seoOgTitle:
            label: Social Title
            type: text
            help: Title shown on Facebook/Twitter cards
          seoOgDescription:
            label: Social Description
            type: textarea
            help: Description shown on Facebook/Twitter cards
          seoOgImage:
            label: Social Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: 1200x630px recommended for social sharing
          seoRobots:
            label: Search Indexing
            type: select
            options:
              - value: index, follow
                text: Index & Follow
              - value: noindex, nofollow
                text: No Index
          seoSchema:
            label: Custom JSON-LD
            type: textarea
            size: small
            help: Override auto-generated schema with custom JSON
  media:
    label: Media
    sections:
      uploads:
        type: files
        label: Images
        template: image
        layout: cards
        upload: true
