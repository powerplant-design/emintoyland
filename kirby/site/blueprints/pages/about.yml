title: About
tabs:
  intro:
    label: Intro
    columns:
      - width: 1/1
        fields:
          aboutIntroHeading:
            label: Heading
            type: text
            default: I'm Emma Hewitt-Johnson (CHSE)
          aboutIntroText:
            label: Text
            type: textarea
            size: large
          aboutIntroImage:
            label: Image
            type: files
            multiple: false
            layout: cards
            parent: page
  credentials:
    label: Credentials
    columns:
      - width: 1/1
        fields:
          aboutCredentialsHeading:
            label: Heading
            type: text
            default: My credentials
          aboutCredentialsItems:
            label: Credentials
            type: structure
            columns:
              heading: true
              text: true
            fields:
              logo:
                label: Logo
                type: files
                multiple: false
                layout: cards
                parent: page
              heading:
                label: Institution
                type: text
              text:
                label: Description
                type: textarea
  supervision:
    label: Supervision
    columns:
      - width: 1/1
        fields:
          aboutSupervisionHeading:
            label: Heading
            type: text
            default: Supervision
          aboutSupervisionItems:
            label: Supervisors
            type: structure
            columns:
              heading: true
              text: true
            fields:
              heading:
                label: Name
                type: text
              text:
                label: Description
                type: textarea
  specialise:
    label: I Specialise In
    columns:
      - width: 1/1
        fields:
          aboutSpecialiseHeading:
            label: Heading
            type: text
            default: I specialise in
          aboutSpecialiseItems:
            label: Specialities
            type: structure
            columns:
              item: true
            fields:
              item:
                label: Item
                type: text
  podcast:
    label: Electric Rodeo
    columns:
      - width: 1/1
        fields:
          aboutPodcastHeading:
            label: Heading
            type: text
            default: The Electric Rodeo Podcast
          aboutPodcastText:
            label: Text
            type: textarea
            size: small
          aboutPodcastImage:
            label: Image
            type: files
            multiple: false
            layout: cards
            parent: page
          aboutPodcastCtaText:
            label: CTA Button Text
            type: text
            width: 1/2
            default: Look at more of my work
          aboutPodcastCtaLink:
            label: CTA Button Link
            type: text
            width: 1/2
            default: /work/
  seo:
    label: SEO
    columns:
      - width: 1/1
        fields:
          seoTitle:
            label: Browser Title
            type: text
            help: Overrides the page title in the browser tab
          seoDescription:
            label: Meta Description
            type: textarea
            help: Search result and social card description
          seoOgTitle:
            label: Social Title
            type: text
            help: Title shown on Facebook/Twitter cards
          seoOgDescription:
            label: Social Description
            type: textarea
            help: Description shown on Facebook/Twitter cards
          seoOgImage:
            label: Social Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: 1200x630px recommended for social sharing
          seoRobots:
            label: Search Indexing
            type: select
            options:
              - value: index, follow
                text: Index & Follow
              - value: noindex, nofollow
                text: No Index
          seoSchema:
            label: Custom JSON-LD
            type: textarea
            size: small
            help: Override auto-generated schema with custom JSON
  media:
    label: Media
    sections:
      uploads:
        type: files
        label: Images
        template: image
        layout: cards
        upload: true
