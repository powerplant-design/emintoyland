title: Work Item
tabs:
  content:
    label: Content
    columns:
      - width: 1/1
        fields:
          workType:
            label: Work Type
            type: select
            options:
              Podcast: Podcast
              Video: Video
              Writing: Writing
              Featured In: Featured In
          workLink:
            label: External Link
            type: url
          workLinkLabel:
            label: Link Button Text
            type: text
            width: 1/2
            default: View original
            placeholder: View original
          workImage:
            label: Thumbnail Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: Shown on the work listing grid
          workHeroImage:
            label: Hero Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: Large image at top of the work detail page
          publishedDate:
            label: Published Date
            type: date
          text:
            label: Card Description
            type: textarea
            help: Short summary shown on the work listing grid
          body:
            label: Body Content
            type: textarea
            size: large
            help: Main content shown on the work detail page
  seo:
    label: SEO
    columns:
      - width: 1/1
        fields:
          seoTitle:
            label: Browser Title
            type: text
            help: Overrides the page title in the browser tab
          seoDescription:
            label: Meta Description
            type: textarea
            help: Search result and social card description
          seoOgTitle:
            label: Social Title
            type: text
            help: Title shown on Facebook/Twitter cards
          seoOgDescription:
            label: Social Description
            type: textarea
            help: Description shown on Facebook/Twitter cards
          seoOgImage:
            label: Social Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: 1200x630px recommended for social sharing
          seoRobots:
            label: Search Indexing
            type: select
            options:
              - value: index, follow
                text: Index & Follow
              - value: noindex, nofollow
                text: No Index
          seoSchema:
            label: Custom JSON-LD
            type: textarea
            size: small
            help: Override auto-generated schema with custom JSON
  media:
    label: Media
    sections:
      uploads:
        type: files
        label: Images
        template: image
        layout: cards
        upload: true
