title: Work Item
tabs:
  content:
    label: Content
    columns:
      - width: 1/1
        fields:
          workType:
            label: Work Type
            type: select
            options:
              Podcast: Podcast
              Video: Video
              Writing: Writing
              Featured In: Featured In
          workLink:
            label: External Link
            type: url
          workImage:
            label: Thumbnail Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: Shown on the work listing grid
          workHeroImage:
            label: Hero Image
            type: files
            multiple: false
            layout: cards
            parent: page
            help: Large image at top of the work detail page
          publishedDate:
            label: Published Date
            type: date
          text:
            label: Card Description
            type: textarea
            help: Short summary shown on the work listing grid
          body:
            label: Body Content
            type: textarea
            size: large
            help: Main content shown on the work detail page
  media:
    label: Media
    sections:
      uploads:
        type: files
        label: Images
        template: image
        layout: cards
        upload: true
